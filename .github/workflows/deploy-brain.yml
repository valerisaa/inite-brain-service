name: Deploy brain.inite.ai

on:
  push:
    branches: [main]
    # `test/**` is intentionally not in the ignore list — `test/eval/scenarios`
    # and `test/eval/fixtures` ship inside the prod image (admin scenario
    # runner reads them at runtime), so a scenario-only change must trigger
    # a deploy. Use explicit `paths` if a narrower trigger is ever needed.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.planning/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | logs'
        required: false
        default: 'deploy'

# Cancel an in-flight auto-deploy when a new push lands. Manual
# dispatches keep their own concurrency group so they don't fight
# auto-deploys.
concurrency:
  group: deploy-brain-${{ github.event_name }}
  cancel-in-progress: true

env:
  PROJECT_NAME: inite-brain-service
  DOMAIN: brain.inite.ai
  PORT: 3000

jobs:
  build-and-push:
    # Skip build for restart/logs ops. Push events have no inputs,
    # so the inputs.action check defaults to true (build runs).
    if: github.event_name == 'push' || (github.event.inputs.action != 'restart' && github.event.inputs.action != 'logs')
    runs-on: [self-hosted, sfo]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # @inite/knowledge SDK is a test-only import (TS path mapping in
      # tsconfig.json points at ../inite-shared/...). Production build
      # only compiles src/ and ships dist/main.js — no SDK code is
      # bundled. So we skip the inite-shared checkout: nothing to fetch.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inite-brain-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inite-brain-service:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inite-brain-service:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inite-brain-service:buildcache,mode=max
          platforms: linux/amd64

      - name: Build info
        run: |
          echo "[ok] Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/inite-brain-service:${{ github.sha }}"

  deploy:
    needs: build-and-push
    # Run the deploy job when:
    #   - push event: only after a successful build
    #   - workflow_dispatch deploy: only after a successful build
    #   - workflow_dispatch restart/logs: skip build, run anyway
    if: |
      always() && (
        (github.event_name == 'push' && needs.build-and-push.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && (needs.build-and-push.result == 'success' || github.event.inputs.action == 'restart' || github.event.inputs.action == 'logs'))
      )
    runs-on: [self-hosted, sfo]

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: github.event.inputs.action != 'logs'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Logs
        if: github.event.inputs.action == 'logs'
        run: |
          cd /opt/projects/${{ env.PROJECT_NAME }}
          docker-compose logs --tail=200 ${{ env.PROJECT_NAME }}

      - name: Deploy to server
        if: github.event.inputs.action != 'logs'
        run: |
          mkdir -p /opt/projects/${{ env.PROJECT_NAME }}
          cd /opt/projects/${{ env.PROJECT_NAME }}

          # Brain talks to the SHARED inite-surrealdb container that lives in
          # the temporal stack (inite-temporal/docker-compose). Brain owns
          # NS=brain (separate from gateway's NS=inite); per-tenant DBs are
          # co_<companyId> created on first request via ensureSchema.
          # Migration 0005 creates the brain_caller editor user — first
          # ensureSchema run on a fresh tenant boots it before the scoped
          # pool tries to sign in.
          tee docker-compose.yml > /dev/null << EOF
          services:
            ${{ env.PROJECT_NAME }}:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/inite-brain-service:latest
              container_name: ${{ env.PROJECT_NAME }}
              restart: unless-stopped
              expose:
                - "${{ env.PORT }}"
              environment:
                - NODE_ENV=production
                - PORT=${{ env.PORT }}
                - LOG_FORMAT=json
                # Shared SurrealDB — same instance gateway uses.
                # NS=inite (shared namespace; brain's tables knowledge_*
                # don't collide with gateway's). Per-tenant DBs are
                # co_<companyId> created on first request via ensureSchema.
                - SURREALDB_URL=ws://inite-surrealdb:8000
                - SURREALDB_USERNAME=${{ secrets.BRAIN_SURREAL_USER }}
                - SURREALDB_PASSWORD=${{ secrets.BRAIN_SURREAL_PASS }}
                - SURREALDB_NAMESPACE=inite
                - SURREALDB_POOL_SIZE=8
                - SURREALDB_SCOPED_POOL_SIZE=8
                - SURREALDB_SCOPED_USER=brain_caller
                - SURREALDB_SCOPED_PASS=${{ secrets.BRAIN_SURREAL_SCOPED_PASS }}
                # OpenAI for embeddings + extraction + faithfulness verifier.
                - OPENAI_API_KEY=${{ secrets.BRAIN_OPENAI_API_KEY }}
                - OPENAI_EMBEDDING_MODEL=text-embedding-3-small
                - OPENAI_EMBEDDING_DIMENSIONS=1536
                - OPENAI_CHAT_MODEL=gpt-4o-mini-2024-07-18
                # OpenAI client budget — same as eval. Per-stage budgets
                # in search.service.ts (SEARCH_STAGE_BUDGET_MS) cap the
                # end-to-end pipeline regardless of what individual calls
                # take, so we don't need OPENAI_TIMEOUT_MS to be the
                # circuit breaker.
                - OPENAI_TIMEOUT_MS=30000
                - OPENAI_MAX_RETRIES=3
                - OPENAI_CONCURRENCY=8
                # Auth — JWKS via auth.inite.ai. NODE_ENV=production +
                # JWKS enabled ⇒ static BRAIN_API_KEYS is REJECTED, JWT only.
                # The brain-landing admin BFF gets its JWT through the
                # auth-service client_credentials grant — see
                # deploy-brain-landing.yml for OAUTH_CLIENT_ID/SECRET wiring.
                - AUTH_SERVICE_URL=https://auth.inite.ai
                - AUTH_SERVICE_JWKS_URL=https://auth.inite.ai/.well-known/jwks.json
                - AUTH_SERVICE_AUDIENCE=brain
                # GDPR forget HMAC — opaque tombstone marker.
                - FORGET_HMAC_KEY=${{ secrets.BRAIN_FORGET_HMAC_KEY }}
                # Search retrieval features — eval-validated ON config.
                # Now safe to keep on because each LLM stage runs under
                # its own withStageBudget wrapper (search.service.ts):
                # router=2s, reranker=4s (parallel SC), cross-encoder=2s,
                # backfill=2s. A stalled LLM fail-opens with the previous
                # stage's result; the request still completes inside the
                # overall pipeline budget instead of stacking 90s × N.
                - SEARCH_PREDICATE_ROUTER_ENABLED=1
                - SEARCH_RERANKER_ENABLED=1
                - SEARCH_RERANKER_SC_N=3
                # HyPE alt-embedding (migration 0008): hypothetical-question
                # embedding written at ingest so a question→statement query
                # pair surfaces via max(cos_main, cos_alt) in the vector leg.
                # Was off — turning on as part of the graph-layer activation
                # so the question-shaped chat queries hit fact statements
                # without an LLM rewrite.
                - SEARCH_HYPE_ENABLED=1
                # PPR over the candidate subgraph (HippoRAG-style). Auto
                # threshold lowered from 100 → 25 so the typical per-tenant
                # graph (~30-80 candidates) actually triggers it. Hub-effect
                # pathology on truly small graphs is bounded by the edge
                # expansion below capping new buckets — neighbour fan-out
                # was the real source of the 30-entity recall@1 regression
                # in the original PPR rollout.
                - SEARCH_PPR_ENABLED=0
                - SEARCH_PPR_AUTO_THRESHOLD=25
                # Edge-based candidate expansion. Top-3 entities by post-
                # bucketing rankScore seed a 1-hop walk over knowledge_edge;
                # neighbours not retrieved by vector/BM25 enter the candidate
                # set with inherited rankScore = α × seed × edge_weight.
                # α=0.4 by default — inherited score never beats a direct
                # retrieval hit; only competes with weak fusion candidates.
                - SEARCH_EDGE_EXPANSION_ENABLED=1
                - SEARCH_EDGE_EXPANSION_TOP_SEEDS=3
                - SEARCH_EDGE_EXPANSION_MAX_NEIGHBOURS=5
                - SEARCH_EDGE_EXPANSION_ALPHA=0.4
                # Multi-hop edge expansion: when a hop's combination is
                # subset_of_previous, expand the prior entity set to
                # include 1-hop neighbours over knowledge_edge before
                # anchoring. Turns the chain into a true graph-walk
                # instead of pure set-membership. Off by default — opt
                # in once the eval baseline is rerun and accepted.
                - MULTI_HOP_EDGE_EXPANSION_ENABLED=0
                # Per-stage budgets (ms). Tunable without redeploy of
                # search.service.ts. Defaults match the constants there;
                # overrides only when prod traffic shape changes.
                - SEARCH_STAGE_BUDGET_ROUTER_MS=2000
                - SEARCH_STAGE_BUDGET_RERANK_MS=4000
                - SEARCH_STAGE_BUDGET_CROSS_ENCODER_MS=2000
                - SEARCH_STAGE_BUDGET_BACKFILL_MS=2000
                # ── Hybrid pipeline knobs ────────────────────────────────
                # Chat router (Sprints 1-4.5): cache, embedding hints,
                # collapse cache, intent classification, skip gate.
                - CHAT_ROUTE_CACHE_ENABLED=true
                - CHAT_ROUTE_CACHE_SIZE=2000
                - CHAT_ROUTE_HINT_SIMILARITY=0.4
                - CHAT_ROUTE_HINT_MAX=3
                - CHAT_ROUTE_INTENT_CONFIDENCE_FLOOR=0.85
                - CHAT_ROUTE_NLI_ENABLED=true
                - CHAT_ROUTE_NLI_ASK_THRESHOLD=0.6
                # Extractor (Sprints E1-E7): cache, local predicate select,
                # local NER, learned pattern cache, skip gate.
                - EXTRACTOR_CACHE_ENABLED=true
                - EXTRACTOR_CACHE_SIZE=500
                # text-embedding-3-small + verbose predicate cards rarely
                # hit 0.85 even on semantic match; 0.55 keeps alias
                # precision high while catching the common cases the
                # academic threshold misses ("job_title"→"status",
                # "preferred_food"→"preference").
                - PREDICATE_CANONICALIZE_THRESHOLD=0.55
                - EXTRACTOR_LOCAL_PREDICATE_THRESHOLD=0.45
                # Opt-in: downloads ~135MB ONNX on first ingest. Required
                # for the E7 skip gate to fire.
                - EXTRACTOR_LOCAL_NER_ENABLED=true
                - EXTRACTOR_LOCAL_NER_MIN_SCORE=0.7
                # Opt-in: synthesises ExtractionResult from local clauses
                # + NER + pattern cache when every check passes. Pattern
                # cache populates as LLM extractions land, so the gate
                # starts cold and warms with usage.
                - EXTRACTOR_SKIP_LLM_ENABLED=true
                # Phase 3.C ConU conformal guardrail (synthesize.service).
                # Floor on the isotonic-calibrated confidence below which a
                # fact is not eligible as a citation target — facts above
                # still appear in the search response, just don't ground
                # the generator. 0.30 matches the bitemporal resolver
                # reject_threshold so a fact admitted as INSERTED is also
                # admitted as a citation. Drop to 0 to disable.
                - SYNTHESIZE_MIN_CONFIDENCE=0.30
                # OpenTelemetry GenAI SemConv. When enabled, every
                # gen_ai.chat.* and gen_ai.embed.* span carries the
                # standard semconv attributes (gen_ai.system,
                # gen_ai.request.model, gen_ai.usage.*). OTLP endpoint
                # defaults to OTEL_EXPORTER_OTLP_ENDPOINT — set the
                # standard env var alongside this flag when wiring up
                # a backend (Langfuse, Phoenix, Tempo, …).
                - OTEL_ENABLED=1
                # ── Multilingual embedder (Phase 4.D) ───────────────────
                # BGE-M3 via @xenova/transformers, local CPU inference.
                # 1024-dim multilingual cross-lingual recall vs OpenAI's
                # text-embedding-3-small (1536-dim, English-biased).
                #
                # ROLLOUT MUST follow the reindex playbook:
                #   1. Deploy this commit so the BGE-M3 provider is
                #      preferred. Warmup is now non-blocking (commit
                #      0cde424), so the container goes /health=ok
                #      immediately and serves search/synthesize on the
                #      openai fallback during the ~10s ONNX load.
                #   2. After /ready returns 200 (model warm), an
                #      operator runs:
                #        curl -X POST -H 'Authorization: Bearer <admin>' \
                #          'https://brain.inite.ai/api/v1/admin/reindex/embeddings?dryRun=true'
                #      to size the work, then re-runs without dryRun
                #      to write the new vectors per tenant.
                #   3. Old vectors stay searchable until rewritten —
                #      reindex is idempotent.
                #
                # Drop to `openai` to roll back to text-embedding-3-small.
                - EMBEDDER_PROVIDER=bge-m3
                # Eval baselines — persisted to a host bind-mount so they
                # survive container recreate (compose pull + up = new
                # container; an in-image var/ would evaporate on every
                # deploy and the diff feature would silently lose history).
                - BRAIN_BASELINES_DIR=/var/brain/baselines
                # ── Phase J/K job queue (Surreal-native) ─────────────────
                # Cron handlers (dreams, compaction, calibration_refit,
                # source_trust_refit) write to job_run as 'pending';
                # WorkerLoopService — gated by the 'worker_loop'
                # leader_lease — claims and dispatches.
                #
                # Kill switch: set JOBS_QUEUE_MODE=inline + restart to
                # roll back to the legacy guard.run() inline path
                # without a redeploy. Use when an unexpected backlog
                # accumulates in pending and the worker loop won't
                # drain (handler not registered, lease acquire fails).
                - JOBS_QUEUE_MODE=enqueue
                - WORKER_LOOP_ENABLED=1
                - WORKER_LOOP_POLL_MS=1000
                - WORKER_LOOP_EMPTY_BACKOFF_MS=5000
                - WORKER_LOOP_LEASE_RENEW_MS=30000
                - LEASE_MANAGER_ENABLED=1
                - JOB_RUN_MAX_ATTEMPTS=3
                - JOB_RUN_BACKOFF_BASE_MS=30000
                # CPU-bound dispatcher pool. Disabled (size=0) because
                # no current handler is registered as cpuBound — the
                # scaffolding is there for future heavy jobs (multi-pass
                # extractor offload, batch normalisation). Flip to 2+
                # when a handler opts in via register({ cpuBound: true,
                # workerModule: __dirname + '/X.worker-job.js' }).
                - JOB_WORKER_POOL_SIZE=0
              volumes:
                - /opt/projects/${{ env.PROJECT_NAME }}/baselines:/var/brain/baselines
              labels:
                # ── Backend routes only — landing handles the rest of brain.inite.ai.
                # Backend owns /v1/*, /mcp/*, /health, /metrics, /openapi.json.
                # Traefik sorts by rule length so this PathPrefix-restricted
                # router naturally outranks the landing's Host-only catch-all.
                - "traefik.enable=true"
                - "traefik.docker.network=traefik-global"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}.rule=Host(\`${{ env.DOMAIN }}\`) && (PathPrefix(\`/v1\`) || PathPrefix(\`/mcp\`) || PathPrefix(\`/health\`) || PathPrefix(\`/metrics\`) || Path(\`/openapi.json\`))"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}.priority=200"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}.entrypoints=websecure"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}.tls=true"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}.tls.certresolver=letsencrypt"
                - "traefik.http.services.${{ env.PROJECT_NAME }}.loadbalancer.server.port=${{ env.PORT }}"
                - "traefik.http.services.${{ env.PROJECT_NAME }}.loadbalancer.responseForwarding.flushInterval=-1"
                # http→https redirect for the same backend paths (landing has its own).
                - "traefik.http.routers.${{ env.PROJECT_NAME }}-http.rule=Host(\`${{ env.DOMAIN }}\`) && (PathPrefix(\`/v1\`) || PathPrefix(\`/mcp\`) || PathPrefix(\`/health\`) || PathPrefix(\`/metrics\`) || Path(\`/openapi.json\`))"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}-http.priority=200"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}-http.entrypoints=web"
                - "traefik.http.routers.${{ env.PROJECT_NAME }}-http.middlewares=redirect-to-https"
                - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
                - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
              healthcheck:
                test: ["CMD", "wget", "-qO-", "http://localhost:${{ env.PORT }}/health"]
                interval: 15s
                timeout: 5s
                retries: 5
                start_period: 30s
              # Resource ceilings: local ONNX (BGE-M3 / NER) + worker pool
              # + LLM fan-out can balloon RSS. Without a cap an unbounded
              # container can OOM the shared host / trip the kernel OOM
              # killer mid-job. Tune per box; these are conservative.
              mem_limit: 2g
              mem_reservation: 768m
              cpus: 2.0
              pids_limit: 512
              networks:
                - traefik-global
                - default

          networks:
            traefik-global:
              external: true
          EOF

          # Bind-mount target must exist and be writable by the container's
          # node user (uid 1000 on node:22-slim — the image now runs as
          # USER node, so this chown matches the runtime user). Without
          # this docker creates it root-owned and BaselineService's
          # fs.writeFile fails with EACCES on first save.
          mkdir -p /opt/projects/${{ env.PROJECT_NAME }}/baselines
          chown -R 1000:1000 /opt/projects/${{ env.PROJECT_NAME }}/baselines || true

          if [ "${{ github.event.inputs.action }}" = "restart" ]; then
            echo "[deploy] restart only"
            docker-compose restart ${{ env.PROJECT_NAME }}
          else
            echo "[deploy] pulling image..."
            docker-compose pull ${{ env.PROJECT_NAME }}
            echo "[deploy] up -d"
            docker-compose up -d --remove-orphans
          fi

          sleep 25

          if docker-compose ps | grep -q "Up"; then
            echo "[ok] ${{ env.DOMAIN }} container is up"
          else
            echo "[err] container failed to start"
            docker-compose logs --tail=100 ${{ env.PROJECT_NAME }}
            exit 1
          fi

      - name: Internal health probe
        if: github.event.inputs.action != 'logs'
        run: |
          cd /opt/projects/${{ env.PROJECT_NAME }}
          # Internal probe via docker exec — bypasses DNS / Traefik /
          # cert provisioning. This is the gate signal: did brain itself
          # boot and respond. External reachability checked separately
          # (warning-only) so a missing DNS record or slow Let's Encrypt
          # cert doesn't fail an otherwise-healthy deploy.
          for i in $(seq 1 18); do
            if docker-compose exec -T ${{ env.PROJECT_NAME }} wget -qO- http://localhost:${{ env.PORT }}/health > /dev/null 2>&1; then
              echo "[ok] container responds on http://localhost:${{ env.PORT }}/health"
              docker-compose exec -T ${{ env.PROJECT_NAME }} wget -qO- http://localhost:${{ env.PORT }}/health | head -c 500
              echo ""
              exit 0
            fi
            echo "[info] waiting for brain to come up... ($i/18)"
            sleep 5
          done
          echo "[err] internal health never responded"
          docker-compose logs --tail=120 ${{ env.PROJECT_NAME }}
          exit 1

      - name: External health probe (warning-only)
        if: github.event.inputs.action != 'logs'
        continue-on-error: true
        run: |
          # Best-effort — DNS may not be wired yet, Let's Encrypt cert
          # provisioning can take 30-90s on first deploy. Failure here
          # surfaces as a workflow warning, not a deploy block.
          for i in $(seq 1 12); do
            if curl -fs https://${{ env.DOMAIN }}/health > /dev/null 2>&1; then
              echo "[ok] https://${{ env.DOMAIN }}/health responds"
              curl -s https://${{ env.DOMAIN }}/health | head -c 500
              echo ""
              exit 0
            fi
            echo "[info] external probe retry ($i/12)..."
            sleep 10
          done
          echo "[warn] https://${{ env.DOMAIN }}/health never responded — check DNS A-record + Traefik cert in droplet logs"

      - name: Cleanup
        if: always() && github.event.inputs.action != 'logs'
        run: docker system prune -f
